<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASGE Editor</title>
    <style>
      :root {
        color-scheme: only dark;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0f141e;
        color: #e3edf9;
      }

      /* ===== 编辑器基础样式 ===== */
      .ProseMirror {
        min-height: 200px;
        outline: none;
        /* 对齐 Steam 指南预览: 内容宽度 638px */
        max-width: 638px;
        margin: 0 auto;
        /* 对齐 Steam 正文样式 */
        font-size: 14px;
        line-height: 20px;
      }

      /* 段落样式: Steam 使用 <br> 换行，段落间距较小 */
      .ProseMirror p {
        margin: 0 0 0.5em;
      }

      .ProseMirror ul,
      .ProseMirror ol {
        padding-left: 1.5rem;
        margin: 0 0 0.5em;
        font-size: 14px;
        line-height: 20px;
      }

      .ProseMirror code {
        background: rgba(102, 192, 244, 0.12);
        padding: 0.1rem 0.25rem;
        border-radius: 0.35rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
        font-size: 11px;
      }

      /* ===== 标题样式: 对齐 Steam bb_h1/bb_h2 ===== */
      .ProseMirror h1,
      .ProseMirror h2,
      .ProseMirror h3 {
        /* Steam 标题颜色: rgb(90, 169, 214) */
        color: #5aa9d6;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      /* H1: Steam bb_h1 = 20px, line-height 23px */
      .ProseMirror h1 {
        font-size: 20px;
        line-height: 23px;
        margin: 0.8em 0 0.4em;
        border-bottom: 1px dotted #666666;
        padding-bottom: 0.3em;
      }

      /* H2: Steam bb_h2 = 18px, line-height 21px */
      .ProseMirror h2 {
        font-size: 18px;
        line-height: 21px;
        margin: 0.7em 0 0.35em;
      }

      /* H3: Steam 无 bb_h3，复用 bb_h2 样式 */
      .ProseMirror h3 {
        font-size: 18px;
        line-height: 21px;
        margin: 0.6em 0 0.3em;
      }

      .ProseMirror pre {
        background: rgba(6, 14, 25, 0.92);
        padding: 0.95rem 1.1rem;
        border-radius: 0.75rem;
        overflow-x: auto;
        border: 1px solid rgba(80, 130, 180, 0.45);
      }

      .ProseMirror a {
        color: #66c0f4;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .nasge-spoiler {
        background: linear-gradient(90deg, #0c1523, #102035);
        color: transparent;
        border-radius: 0.35rem;
        padding: 0.05rem 0.3rem;
        transition: color 0.2s ease, background 0.2s ease;
      }

      .nasge-spoiler:hover {
        background: rgba(102, 192, 244, 0.12);
        color: #d7e8ff;
      }

      .nasge-table {
        width: auto;
        max-width: 100%;
        border-collapse: collapse;
        table-layout: auto;
        margin: 0.6rem 0;
        background: rgba(8, 15, 26, 0.82);
      }

      .nasge-table td,
      .nasge-table th {
        border: 1px solid rgba(102, 192, 244, 0.18);
        padding: 0.6rem 0.75rem;
        background: rgba(8, 15, 26, 0.88);
        color: #d7e8ff;
        white-space: nowrap;
      }

      .nasge-table th {
        background: rgba(14, 29, 46, 0.95);
        font-weight: 600;
        text-align: left;
      }

      .nasge-table td {
        font-weight: 500;
      }

      .nasge-table tr:nth-child(odd) td {
        background: rgba(10, 20, 33, 0.88);
      }

      .nasge-image {
        max-width: 100%;
        border-radius: 0.75rem;
        border: 1px solid rgba(102, 192, 244, 0.18);
        margin: 0.5rem 0;
      }
      .nasge-quote {
        border: 1px solid rgba(102, 192, 244, 0.28);
        border-radius: 0.75rem;
        padding: 0.85rem 1rem;
        background: rgba(10, 18, 30, 0.78);
        margin: 0.8rem 0;
      }

      .nasge-quote[data-author]:not([data-author=""]) p:first-child {
        font-size: 0.85rem;
        color: #9eb4d4;
        margin-bottom: 0.5rem;
      }

      .nasge-quote p {
        margin: 0 0 0.75rem;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
