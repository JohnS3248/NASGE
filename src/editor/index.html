<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASGE Editor</title>
    <style>
      :root {
        color-scheme: only dark;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0f141e;
        color: #e3edf9;
      }

      .ProseMirror {
        min-height: 200px;
        outline: none;
      }

      .ProseMirror p {
        margin: 0 0 0.75rem;
      }

      .ProseMirror ul,
      .ProseMirror ol {
        padding-left: 1.5rem;
      }

      .ProseMirror code {
        background: rgba(102, 192, 244, 0.12);
        padding: 0.1rem 0.25rem;
        border-radius: 0.35rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
      }

      .ProseMirror pre {
        background: rgba(6, 14, 25, 0.9);
        padding: 0.9rem 1.1rem;
        border-radius: 0.75rem;
        overflow-x: auto;
        border: 1px solid rgba(102, 192, 244, 0.18);
      }

      .ProseMirror a {
        color: #66c0f4;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .nasge-spoiler {
        background: linear-gradient(90deg, #0c1523, #102035);
        color: transparent;
        border-radius: 0.35rem;
        padding: 0.05rem 0.3rem;
        transition: color 0.2s ease, background 0.2s ease;
      }

      .nasge-spoiler:hover {
        background: rgba(102, 192, 244, 0.12);
        color: #d7e8ff;
      }

      .nasge-table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.4rem 0;
      }

      .nasge-table td,
      .nasge-table th {
        border: 1px solid rgba(102, 192, 244, 0.18);
        padding: 0.5rem 0.6rem;
        background: rgba(8, 15, 26, 0.85);
      }

      .nasge-table th {
        background: rgba(12, 27, 44, 0.9);
        font-weight: 600;
      }

      .nasge-image {
        max-width: 100%;
        border-radius: 0.75rem;
        border: 1px solid rgba(102, 192, 244, 0.18);
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
