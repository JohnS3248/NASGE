<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASGE Editor</title>
    <style>
      :root {
        color-scheme: only dark;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0f141e;
        color: #e3edf9;
      }

      /* ===== 编辑器基础样式 ===== */
      .ProseMirror {
        min-height: 200px;
        outline: none;
        /* 对齐 Steam 指南预览: 内容宽度 638px */
        max-width: 638px;
        margin: 0 auto;
        /* 对齐 Steam 正文样式 */
        font-size: 14px;
        line-height: 20px;
      }

      /* 段落样式: Steam 使用 <br> 换行，段落间距较小 */
      .ProseMirror p {
        margin: 0 0 0.5em;
      }

      .ProseMirror ul,
      .ProseMirror ol {
        padding-left: 1.5rem;
        margin: 0 0 0.5em;
        font-size: 14px;
        line-height: 20px;
      }

      .ProseMirror code {
        background: rgba(102, 192, 244, 0.12);
        padding: 0.1rem 0.25rem;
        border-radius: 0.35rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
        font-size: 11px;
      }

      /* 删除线: Steam span.bb_strike */
      .ProseMirror s {
        text-decoration: line-through;
      }

      /* ===== 标题样式: 完全对齐 Steam bb_h1/bb_h2/bb_h3 ===== */
      /* H1: Steam div.bb_h1 */
      .ProseMirror h1 {
        font-size: 20px;
        line-height: 23px;
        color: #5aa9d6;
        font-weight: normal;
        margin-bottom: 10px;
        margin-top: 0;
        clear: both;
        /* NASGE 额外: 分隔线 */
        border-bottom: 1px dotted #666666;
        padding-bottom: 0.3em;
      }

      /* H2: Steam div.bb_h2 */
      .ProseMirror h2 {
        color: #5aa9d6;
        margin-bottom: 6px;
        margin-top: 8px;
        font-size: 18px;
        line-height: 21px;
        font-weight: 400;
        clear: both;
      }

      /* H3: Steam div.bb_h3 */
      .ProseMirror h3 {
        color: #5aa9d6;
        margin-bottom: 6px;
        margin-top: 8px;
        font-size: 16px;
        line-height: 19px;
        font-weight: 300;
        clear: both;
      }

      /* 代码块: Steam div.bb_code */
      .ProseMirror pre {
        border: 1px solid #535354;
        border-radius: 3px;
        padding: 12px;
        margin: 8px;
        font-size: 11px;
        font-family: Consolas, monospace;
        white-space: pre;
        white-space: pre-wrap;
        overflow-x: auto;
        background: rgba(6, 14, 25, 0.92);
      }

      .ProseMirror a {
        color: #66c0f4;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      /* Spoiler: Steam span.bb_spoiler */
      .nasge-spoiler {
        color: #000000;
        background-color: #000000;
        padding: 0px 8px;
      }

      .nasge-spoiler:hover {
        color: #ffffff;
      }

      .nasge-spoiler > span {
        visibility: hidden;
      }

      .nasge-spoiler:hover > span {
        visibility: visible;
      }

      /* 表格: Steam div.bb_table */
      .nasge-table {
        display: table;
        font-size: 12px;
        margin: 0.6rem 0;
        border-collapse: collapse;
      }

      .nasge-table th {
        font-weight: bold;
        border: 1px solid #4d4d4d;
        padding: 4px 8px;
        background: transparent;
        min-width: 1.5em;
      }

      .nasge-table tr {
        display: table-row;
      }

      .nasge-table td {
        vertical-align: middle;
        border: 1px solid #4d4d4d;
        padding: 4px 8px;
        background: transparent;
        min-width: 1.5em;
      }

      .nasge-image {
        max-width: 100%;
        border-radius: 0.75rem;
        border: 1px solid rgba(102, 192, 244, 0.18);
        margin: 0.5rem 0;
      }

      /* ===== 图片节点样式: 对齐 Steam 指南预览 ===== */
      /* 图片节点容器：移除底部 margin，与 Steam 一致 */
      .nasge-image-node {
        margin-bottom: 0 !important;
      }

      /* 图片节点后面紧跟的段落：移除顶部 margin */
      .nasge-image-node + p {
        margin-top: 0;
      }
      /* 引用块: Steam blockquote.bb_blockquote */
      .nasge-quote {
        border: 1px solid #56707f;
        border-radius: 3px;
        padding: 12px;
        margin: 8px;
        font-size: 92%;
        display: table;
        word-break: break-word;
      }

      .nasge-quote[data-author]:not([data-author=""]) p:first-child {
        font-size: 0.85rem;
        color: #9eb4d4;
        margin-bottom: 0.5rem;
      }

      .nasge-quote p {
        margin: 0 0 0.75rem;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
