<!doctype html>
<html lang="zh-CN" data-theme="steam-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASGE Editor</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/themes.css" />
    <link rel="stylesheet" href="./styles/wholeGuide.css" />
    <style>
      :root {
        color-scheme: only dark;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0f141e;
        color: #e3edf9;
      }

      /* ===== 主编辑器基础样式（限定在 .nasge-editor-container 内） ===== */
      .nasge-editor-container .ProseMirror {
        min-height: 200px;
        outline: none;
        /* 对齐 Steam 指南预览: 内容宽度 638px */
        width: 638px;
        min-width: 638px;
        margin: 0 auto;
        /* Steam-confirmed values (2026-03-08 DevTools) */
        font-family: "Motiva Sans", Arial, Helvetica, sans-serif;
        font-size: 14px;
        line-height: 20px !important;
        font-weight: 400;
        color: #969696;
        caret-color: #66c0f4;
        overflow: hidden;
      }

      /* GapCursor: 块级元素间的光标指示线（深色背景适配） */
      .nasge-editor-container .ProseMirror-gapcursor:after {
        border-top: 1px solid #66c0f4;
      }

      /* 段落样式: Steam 使用 <br> 换行，纯靠 line-height 控制间距 */
      .nasge-editor-container .ProseMirror p {
        margin: 0;
      }

      .nasge-editor-container .ProseMirror ul {
        margin: 14px 0 8px 14px;
        padding-left: 0;
        font-size: 14px;
        line-height: 19px;
      }

      .nasge-editor-container .ProseMirror ol {
        margin: 14px 0 8px 0;
        padding-left: 40px;
        font-size: 14px;
        line-height: 19px;
      }

      .nasge-editor-container .ProseMirror li {
        line-height: 19px;
        padding-right: 14px;
      }

      /* 确保列表有标记（移除 prose 后需要显式声明） */
      .nasge-editor-container .ProseMirror ul {
        list-style-type: disc;
      }

      .nasge-editor-container .ProseMirror ol {
        list-style-type: decimal;
      }

      /* 水平线 */
      .nasge-editor-container .ProseMirror hr {
        border: 1px inset rgb(128, 128, 128);
        margin: 7px 0;
      }

      /* 图片最大宽度 */
      .nasge-editor-container .ProseMirror img {
        max-width: 100%;
      }

      .nasge-editor-container .ProseMirror code {
        background: transparent;
        padding: 0.1rem 0.25rem;
        border-radius: 0;
        font-family: Consolas, monospace;
        font-size: 11px;
      }

      /* 删除线: Steam span.bb_strike */
      .nasge-editor-container .ProseMirror s {
        text-decoration: line-through;
      }

      /* ===== 标题样式: 完全对齐 Steam bb_h1/bb_h2/bb_h3 ===== */
      /* H1: Steam div.bb_h1 */
      .nasge-editor-container .ProseMirror h1 {
        font-size: 20px;
        line-height: 23px;
        color: #5aa9d6;
        font-weight: normal;
        margin-bottom: 10px;
        margin-top: 0;
        clear: both;
        padding-bottom: 0;
      }

      /* H2: Steam div.bb_h2 */
      .nasge-editor-container .ProseMirror h2 {
        color: #5aa9d6;
        margin-bottom: 6px;
        margin-top: 8px;
        font-size: 18px;
        line-height: 21px;
        font-weight: 400;
        clear: both;
      }

      /* H3: Steam div.bb_h3 */
      .nasge-editor-container .ProseMirror h3 {
        color: #5aa9d6;
        margin-bottom: 6px;
        margin-top: 8px;
        font-size: 16px;
        line-height: 19px;
        font-weight: 300;
        clear: both;
      }

      /* chapterTitle: 章节边界标记节点
         视觉装饰（顶部光晕 + 横线）由 styles/wholeGuide.css 注入 */
      .nasge-editor-container .ProseMirror h1.nasge-chapter-title {
        font-size: 18px;
        line-height: normal;
        font-weight: 400;
        color: #66c0f4;
        margin: 0 0 10px;
        /* padding-top 20px = Steam subSection padding-top 10 + subSectionTitle padding-top 10
           让两层 background-image 装饰完整显示（topbg 在 8px 处开始） */
        padding: 20px 0 0;
        clear: both;
      }

      /* chapterTitle 内 inline marks 与 Steam <b>/<i>/<u>/<s> 渲染一致 */
      .nasge-editor-container .ProseMirror h1.nasge-chapter-title strong {
        font-weight: bold;
      }
      .nasge-editor-container .ProseMirror h1.nasge-chapter-title em {
        font-style: italic;
      }
      .nasge-editor-container .ProseMirror h1.nasge-chapter-title u {
        text-decoration: underline;
      }
      .nasge-editor-container .ProseMirror h1.nasge-chapter-title s {
        text-decoration: line-through;
      }

      /* 代码块: Steam div.bb_code */
      .nasge-editor-container .ProseMirror pre {
        border: 1px solid #535354;
        border-radius: 3px;
        padding: 12px;
        margin: 8px;
        font-size: 11px;
        font-family: Consolas, "Courier New", monospace;
        white-space: pre;
        white-space: pre-wrap;
        overflow-x: auto;
        background: rgba(6, 14, 25, 0.92);
      }

      .nasge-editor-container .ProseMirror a {
        color: #ebebeb;
        text-decoration: none;
      }

      /* Spoiler: Steam span.bb_spoiler */
      .nasge-spoiler {
        color: #000000;
        background-color: #000000;
        padding: 0px 8px;
      }

      .nasge-spoiler:hover {
        color: #ffffff;
      }

      .nasge-spoiler > span {
        visibility: hidden;
      }

      .nasge-spoiler:hover > span {
        visibility: visible;
      }

      /* 表格: Steam div.bb_table */
      .nasge-table {
        display: table;
        font-size: 12px;
        margin: 0;
        border-collapse: collapse;
      }

      .nasge-table th {
        font-weight: bold;
        border: 1px solid #4d4d4d;
        padding: 4px;
        background: transparent;
        min-width: 1.5em;
        text-align: start;
      }

      .nasge-table tr {
        display: table-row;
      }

      .nasge-table td {
        vertical-align: middle;
        border: 1px solid #4d4d4d;
        padding: 4px;
        background: transparent;
        min-width: 1.5em;
      }

      /* 选中单元格高亮 */
      .nasge-table .selectedCell {
        background: rgba(102, 192, 244, 0.08) !important;
      }

      /* 表格 hover 行高亮（> td 防止嵌套表格被连带高亮） */
      .nasge-table tr:hover > td,
      .nasge-table tr:hover > th {
        background: rgba(102, 192, 244, 0.03);
      }

      .nasge-image {
        max-width: 100%;
      }
      /* 引用块: Steam blockquote.bb_blockquote */
      .nasge-quote {
        border: 1px solid #56707f;
        padding: 12px;
        margin: 8px;
        font-size: 92%;
        display: table;
        word-break: break-word;
      }

      .nasge-quote p {
        margin: 0;
      }

      .nasge-quote[data-author]:not([data-author=""]) p:first-child {
        font-style: italic;
        color: #898989;
        font-size: 12px;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
