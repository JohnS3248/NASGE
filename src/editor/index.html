<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASGE Editor</title>
    <style>
      :root {
        color-scheme: only dark;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0f141e;
        color: #e3edf9;
      }

      .ProseMirror {
        min-height: 200px;
        outline: none;
      }

      .ProseMirror p {
        margin: 0 0 0.75rem;
      }

      .ProseMirror ul,
      .ProseMirror ol {
        padding-left: 1.5rem;
      }

      .ProseMirror code {
        background: rgba(102, 192, 244, 0.12);
        padding: 0.1rem 0.25rem;
        border-radius: 0.35rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
      }

      .ProseMirror h1,
      .ProseMirror h2,
      .ProseMirror h3 {
        color: #66c0f4;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .ProseMirror h1 {
        font-size: 1.85rem;
        margin: 1.8rem 0 1rem;
        border-bottom: 1px solid rgba(102, 192, 244, 0.25);
        padding-bottom: 0.4rem;
      }

      .ProseMirror h2 {
        font-size: 1.45rem;
        margin: 1.4rem 0 0.9rem;
        color: #74c6ff;
      }

      .ProseMirror h3 {
        font-size: 1.2rem;
        margin: 1.2rem 0 0.75rem;
        color: #8dd4ff;
      }

      .ProseMirror pre {
        background: rgba(6, 14, 25, 0.92);
        padding: 0.95rem 1.1rem;
        border-radius: 0.75rem;
        overflow-x: auto;
        border: 1px solid rgba(80, 130, 180, 0.45);
      }

      .ProseMirror a {
        color: #66c0f4;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .nasge-spoiler {
        background: linear-gradient(90deg, #0c1523, #102035);
        color: transparent;
        border-radius: 0.35rem;
        padding: 0.05rem 0.3rem;
        transition: color 0.2s ease, background 0.2s ease;
      }

      .nasge-spoiler:hover {
        background: rgba(102, 192, 244, 0.12);
        color: #d7e8ff;
      }

      .nasge-table {
        width: auto;
        max-width: 100%;
        border-collapse: collapse;
        table-layout: auto;
        margin: 0.6rem 0;
        background: rgba(8, 15, 26, 0.82);
      }

      .nasge-table td,
      .nasge-table th {
        border: 1px solid rgba(102, 192, 244, 0.18);
        padding: 0.6rem 0.75rem;
        background: rgba(8, 15, 26, 0.88);
        color: #d7e8ff;
        white-space: nowrap;
      }

      .nasge-table th {
        background: rgba(14, 29, 46, 0.95);
        font-weight: 600;
        text-align: left;
      }

      .nasge-table td {
        font-weight: 500;
      }

      .nasge-table tr:nth-child(odd) td {
        background: rgba(10, 20, 33, 0.88);
      }

      .nasge-image {
        max-width: 100%;
        border-radius: 0.75rem;
        border: 1px solid rgba(102, 192, 244, 0.18);
        margin: 0.5rem 0;
      }
      .nasge-quote {
        border: 1px solid rgba(102, 192, 244, 0.28);
        border-radius: 0.75rem;
        padding: 0.85rem 1rem;
        background: rgba(10, 18, 30, 0.78);
        margin: 0.8rem 0;
      }

      .nasge-quote[data-author]:not([data-author=""]) p:first-child {
        font-size: 0.85rem;
        color: #9eb4d4;
        margin-bottom: 0.5rem;
      }

      .nasge-quote p {
        margin: 0 0 0.75rem;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
