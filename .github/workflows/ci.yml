name: CI

# 触发条件：push 到 main 或向 main 发 PR 时
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check + Test + Build
    runs-on: ubuntu-latest

    steps:
      # 1. 把仓库代码拉到虚拟机
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. 安装 Node.js（读取 .nvmrc）
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # 3. 严格模式安装依赖（完全按 package-lock.json）
      - name: Install dependencies
        run: npm ci

      # 4. TypeScript 类型检查
      - name: Type check
        run: npm run type-check

      # 5. 单元测试 + 覆盖率
      - name: Run tests with coverage
        run: npm run test:coverage

      # 6. 上传覆盖率 HTML 报告为 artifact（不设阈值，仅归档）
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # 7. 生产构建
      - name: Build
        run: npm run build
